    { key: "trends",     icon: "bubble_chart",        label: "Trends Discovery" },

  const active = "overview";
  return (

      </div>
      <nav className="sd-body">
        {items.map(it => (

          </a>

    </aside>

}

function useClickAway(ref, close) {
  React.useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) close(); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
}

/* Topic selector chip (Overview section 1). */
function TopicSelector() {
  const [open, setOpen] = React.useState(false);
  const [sel, setSel] = React.useState("Tesla");
  const ref = React.useRef(null); useClickAway(ref, () => setOpen(false));
  const TOPICS = ["Tesla", "BMW", "Ford", "Rivian", "Volkswagen"];
  return (
    <span className="lm-pop-wrap" ref={ref}>
      <button className="ov-topicsel" type="button" onClick={() => setOpen(o => !o)} aria-expanded={open}>
        <span className="dot"></span>{sel}<span className="material-symbols-outlined">keyboard_arrow_down</span>
      </button>
      {open && (
        <div className="ov-pop">
          {TOPICS.map(t => (
            <div key={t} className="ov-pop-item" role="option" aria-selected={t === sel} onClick={() => { setSel(t); setOpen(false); }}>
              {t}{t === sel && <span className="material-symbols-outlined">check</span>}
            </div>
          ))}
        </div>
      )}
    </span>
  );
}

/* Monotone-cubic smoothing for the line/area chart. */
function smoothPath(pts) {
  const n = pts.length;
  if (n < 2) return "";
  const dx = [], sl = [];
  for (let i = 0; i < n - 1; i++) { dx[i] = pts[i+1][0] - pts[i][0]; sl[i] = (pts[i+1][1] - pts[i][1]) / dx[i]; }
  const t = [sl[0]];
  for (let i = 1; i < n - 1; i++) t.push(sl[i-1] * sl[i] <= 0 ? 0 : (sl[i-1] + sl[i]) / 2);
  t.push(sl[n-2]);
  let d = "M" + pts[0][0] + "," + pts[0][1];
  for (let i = 0; i < n - 1; i++) {
    const a = dx[i] / 3;
    d += " C" + (pts[i][0]+a) + "," + (pts[i][1]+a*t[i]) + " " + (pts[i+1][0]-a) + "," + (pts[i+1][1]-a*t[i+1]) + " " + pts[i+1][0] + "," + pts[i+1][1];
  }
  return d;
}

const OV_X0 = 10, OV_XN = 918, OV_Y0 = 12, OV_YN = 200, OV_MAX = 700;
const OV_DATA = [320, 410, 365, 520, 470, 615, 560];
const OV_DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
const ovx = i => OV_X0 + (i / (OV_DATA.length - 1)) * (OV_XN - OV_X0);
const ovy = v => OV_Y0 + (1 - v / OV_MAX) * (OV_YN - OV_Y0);

function OverviewChart() {
  const pts = OV_DATA.map((v, i) => [ovx(i), ovy(v)]);
  const line = smoothPath(pts);
  const area = line + " L" + OV_XN + "," + OV_YN + " L" + OV_X0 + "," + OV_YN + " Z";
  const grid = [0, 175, 350, 525, 700];
  return (
    <svg className="ov-chart" viewBox="0 0 928 230" role="img" aria-label="Daily mention volume, last 7 days">
      {grid.map(v => (
        <line key={v} x1={OV_X0} y1={ovy(v)} x2={OV_XN} y2={ovy(v)} stroke="var(--bento-theme-color-border-subtle)" strokeWidth="1"/>
      ))}
      <path d={area} fill="var(--bento-theme-color-bg-primary)" fillOpacity="0.10"/>
      <path d={line} fill="none" stroke="var(--bento-theme-color-bg-primary)" strokeWidth="2.5" strokeLinecap="round"/>
      {pts.map(([x, y], i) => (
        <circle key={i} cx={x} cy={y} r="3.5" fill="var(--bento-theme-color-bg-surface)" stroke="var(--bento-theme-color-bg-primary)" strokeWidth="2"/>
      ))}
      {OV_DAYS.map((d, i) => (
        <text key={d} x={ovx(i)} y={OV_YN + 22} textAnchor="middle" fontSize="11"
              fill="var(--bento-theme-color-text-subtle)" fontFamily="var(--bento-theme-font-families-primary)">{d}</text>
      ))}
    </svg>
  );
}

              <span className="material-symbols-outlined">trending_up</span>
              <span className="q">{q}</span>
              <span className="n">{n}</span>

          ))}

      </div>

  );
}

/* ── Create-alert wizard (board AlertCreationSimplified 3102:128511) ── */
const LM_ALERT_TYPES = [
  ["results", "notifications_active", "New results alert", "Send an alert when there are new results"],
  ["volume", "trending_up", "Volume alert", "Send an alert when mention volume changes sharply"],
  ["engagement", "favorite", "Engagement alert", "Send an alert when engagement spikes or drops"],
  ["sentiment", "mood", "Sentiment alert", "Send an alert when sentiment shifts"],
];
const LM_ALERT_STEPS = ["Alert type", "Trigger", "Details", "Delivery methods"];
function LumenAlertModal({ onClose }) {
  const [step, setStep] = React.useState(0);
  const [type, setType] = React.useState("results");
  const [trigger, setTrigger] = React.useState("every");
  const next = () => setStep(s => Math.min(3, s + 1));
  const back = () => step === 0 ? onClose() : setStep(s => s - 1);
  return (
    <div className="lm-modal-scrim" onClick={onClose}>
      <div className="lm-modal lm-modal--wizard" role="dialog" aria-modal="true" aria-label="Create new alert" onClick={e => e.stopPropagation()}>
        <div className="lm-modal-head"><h2>Create new alert</h2><button className="lm-icon-btn" aria-label="Close" title="Close" onClick={onClose}><span className="material-symbols-outlined">close</span></button></div>
        <div className="lm-steps" aria-hidden="true">
          {LM_ALERT_STEPS.map((s, i) => (
            <React.Fragment key={s}>
              {i > 0 && <span className={"lm-stepline" + (i <= step ? " on" : "")}></span>}
              <div className={"lm-step" + (i === step ? " on" : i < step ? " done" : "")}>
                <span className="num">{i < step ? <span className="material-symbols-outlined">check</span> : i + 1}</span>
                <span className="lbl">{s}</span>
              </div>
            </React.Fragment>
          ))}
        </div>
        <div className="lm-modal-body">
          {step === 0 && (
            <div className="lm-field"><label>Alert type</label>
              <div className="lm-choices">
                {LM_ALERT_TYPES.map(([k, ic, t, d]) => (
                  <button key={k} type="button" className={"lm-choice" + (type === k ? " on" : "")} aria-pressed={type === k} onClick={() => setType(k)}>
                    <span className="lm-choice-ic"><span className="material-symbols-outlined">{ic}</span></span>
                    <span className="lm-choice-tx"><span className="t">{t}</span><span className="d">{d}</span></span>
                    <span className="lm-radio" aria-hidden="true"></span>
                  </button>
                ))}
              </div>
            </div>
          )}
          {step === 1 && (
            <div className="lm-field"><label>Trigger</label>
              <div className="lm-controls">
                {[["every", "Every new result", "Send an alert every time there is a new result"], ["threshold", "Define a number of results", "Send an alert when there is a specific number of new results"]].map(([k, t, d]) => (
                  <label key={k} className={"lm-control" + (trigger === k ? " on" : "")}>
                    <span className={"lm-radio" + (trigger === k ? " on" : "")} aria-hidden="true"></span>
                    <input type="radio" name="lm-trigger" checked={trigger === k} onChange={() => setTrigger(k)} style={{ position: "absolute", opacity: 0 }} />
                    <span className="lm-control-tx"><span className="t">{t}</span><span className="d">{d}</span></span>
                  </label>
                ))}
              </div>
              {trigger === "threshold" && (
                <div className="lm-field" style={{ marginTop: 14, maxWidth: 220 }}><label>Number of results</label><input className="hs-input" defaultValue="100" /></div>
              )}
            </div>
          )}
          {step === 2 && (<React.Fragment>
            <div className="lm-field"><label>Alert name</label><input className="hs-input" placeholder="Please enter alert name" defaultValue="Spike in negative sentiment" /></div>
            <div className="lm-field"><label>Description <span style={{ fontWeight: 400, color: "var(--bento-theme-color-text-subtle)" }}>(optional)</span></label><textarea className="hs-input" style={{ height: 88, padding: 12, resize: "none" }} placeholder="Please enter alert description"></textarea></div>
          </React.Fragment>)}
          {step === 3 && (<React.Fragment>
            <div className="lm-field"><label>Deliver to</label>
              <div className="lm-controls">
                <label className="lm-control on"><span className="hs-check is-on" aria-hidden="true"></span><span className="lm-control-tx"><span className="t">Email · Ryan Williams</span><span className="d">ryan@somos.com</span></span></label>
                <label className="lm-control"><span className="hs-check" aria-hidden="true"></span><span className="lm-control-tx"><span className="t">In-app notification</span></span></label>
              </div>
            </div>
            <div className="lm-field"><label>Add an email <span style={{ fontWeight: 400, color: "var(--bento-theme-color-text-subtle)" }}>(optional)</span></label><input className="hs-input" placeholder="name@company.com" /></div>
          </React.Fragment>)}
        </div>
        <div className="lm-modal-foot">
          <span className="lm-step-meta">Step {step + 1} of 4 · {LM_ALERT_STEPS[step]}</span>
          <span style={{ flex: 1 }}></span>
          <button className="hs-btn hs-btn--ghost" type="button" onClick={back}>{step === 0 ? "Cancel" : "Back"}</button>
          {step < 3
            ? <button className="hs-btn hs-btn--primary" type="button" onClick={next}>Next</button>
            : <button className="hs-btn hs-btn--primary" type="button" onClick={onClose}>Create</button>}
        </div>
      </div>
    </div>
  );
}

/* ── Schedule-report modal (board "Create a new report" 3102:125341) ── */
function LumenScheduleModal({ onClose }) {
  const [scheduling, setScheduling] = React.useState(true);
  const [mailing, setMailing] = React.useState(true);
  const [notify, setNotify] = React.useState(false);
  const Toggle = ({ on, set }) => (
    <button type="button" role="switch" aria-checked={on} className={"hs-toggle" + (on ? " is-on" : "")} onClick={() => set(v => !v)}></button>
  );
  return (
    <div className="lm-modal-scrim" onClick={onClose}>
      <div className="lm-modal" role="dialog" aria-modal="true" aria-label="Create a new report" onClick={e => e.stopPropagation()}>
        <div className="lm-modal-head"><h2>Create a new report</h2><button className="lm-icon-btn" aria-label="Close" title="Close" onClick={onClose}><span className="material-symbols-outlined">close</span></button></div>
        <div className="lm-modal-body">
          <div className="lm-togglerow"><div className="lm-toggle-tx"><span className="t">Enable scheduling</span><span className="d">Send this report automatically on a recurring basis</span></div><Toggle on={scheduling} set={setScheduling} /></div>
          {scheduling && (
            <div className="lm-field"><label>Send report every</label>
              <div className="lm-sched">
                <input className="hs-input" defaultValue="1" style={{ width: 64 }} />
                <button className="hs-select" type="button"><span>Day(s)</span><span className="material-symbols-outlined chev">keyboard_arrow_down</span></button>
                <button className="hs-select" type="button"><span>9:00 AM</span><span className="material-symbols-outlined chev">keyboard_arrow_down</span></button>
              </div>
            </div>
          )}
          <div className="lm-togglerow"><div className="lm-toggle-tx"><span className="t">Include mailing list</span><span className="d">Send to a saved list of recipients</span></div><Toggle on={mailing} set={setMailing} /></div>
          <div className="lm-togglerow"><div className="lm-toggle-tx"><span className="t">Send notifications</span><span className="d">Notify recipients when the report is ready</span></div><Toggle on={notify} set={setNotify} /></div>
        </div>
        <div className="lm-modal-foot">
          <button className="hs-btn hs-btn--ghost" type="button" onClick={onClose}>Back</button>
          <span style={{ flex: 1 }}></span>
          <button className="hs-btn hs-btn--ghost" type="button" onClick={onClose}>Cancel</button>
          <button className="hs-btn hs-btn--primary" type="button" onClick={onClose}>Create</button>
        </div>
      </div>
    </div>
  );
}

/* ── State surfaces ────────────────────────────────────────────────── */
function LumenEmpty() {
  return (
    <div className="suite-state empty">
      <div className="suite-state-inner">
        <div className="ico"><span className="material-symbols-outlined">travel_explore</span></div>
        <h2>No topics tracked yet</h2>
        <p>Set up a listening topic to track brand mentions, sentiment, and reach across the social web. Results stream in within minutes.</p>
        <div className="acts"><button className="hs-btn hs-btn--secondary" type="button"><span className="material-symbols-outlined">school</span>How listening works</button><button className="hs-btn hs-btn--primary" type="button"><span className="material-symbols-outlined">add</span>Create a topic</button></div>
      </div>
    </div>
  );
}
function LumenError({ onRetry }) {
  return (
    <div className="suite-state error">
      <div className="suite-state-inner">
        <div className="ico"><span className="material-symbols-outlined">cloud_off</span></div>
        <h2>We couldn't load listening data</h2>
        <p>The data stream didn't respond in time. Your topics and alerts are unaffected — try refreshing the results.</p>
        <div className="acts"><button className="hs-btn hs-btn--secondary" type="button"><span className="material-symbols-outlined">help</span>View status</button><button className="hs-btn hs-btn--primary" type="button" onClick={onRetry}><span className="material-symbols-outlined">refresh</span>Try again</button></div>
      </div>
    </div>
  );
}
function LumenLoading() {
  return (
    <div className="ti-content" aria-busy="true">
      <div className="ov">
        <div className="ti-card"><div className="suite-sk" style={{ width: "40%", height: 16, marginBottom: 16 }}></div><div className="suite-sk" style={{ width: "100%", height: 220, borderRadius: 8 }}></div></div>
        <div className="ti-card"><div className="suite-sk" style={{ width: "30%", height: 16, marginBottom: 16 }}></div><div className="suite-sk" style={{ width: "100%", height: 44, borderRadius: 8 }}></div></div>
        <div className="ti-grid" style={{ gridTemplateColumns: "1fr 1fr 1fr" }}>
          {[0,1,2].map(i => <div className="ti-card" key={i}><div className="suite-sk" style={{ width: "60%", height: 14, marginBottom: 12 }}></div><div className="suite-sk" style={{ width: "100%", height: 80, borderRadius: 8 }}></div></div>)}
        </div>
      </div>
    </div>
  );
}

/* ── App root ──────────────────────────────────────────────────────── */
function App() {
  const [surface, setSurface] = React.useState("main"); // main | empty | error | loading
  const [scheduleOpen, setScheduleOpen] = React.useState(false);
  const [alertOpen, setAlertOpen] = React.useState(false);
  const onState = (k) => {
    if (k === "detail") { setSurface("main"); setAlertOpen(false); setScheduleOpen(true); }
    else if (k === "edit") { setSurface("main"); setScheduleOpen(false); setAlertOpen(true); }
    else { setScheduleOpen(false); setAlertOpen(false); setSurface(k); }
  };
  const demoValue = alertOpen ? "edit" : scheduleOpen ? "detail" : surface;
  React.useEffect(() => {
    const others = document.querySelector('.suite-rail .others');
    if (!others || others.querySelector('[data-lm-injected]')) return;
    const btn = document.createElement('button');
    btn.className = 'suite-navbtn util';
    btn.setAttribute('data-lm-injected', 'help_outline');
    btn.setAttribute('aria-label', 'Help');
    btn.setAttribute('title', 'Help');
    btn.style.cssText = 'border:0;background:transparent;cursor:pointer;padding:0;width:100%;';
    btn.innerHTML = '<span class="circle"><span class="material-symbols-outlined">help_outline</span></span>';
    others.insertBefore(btn, others.firstChild);
  }, []);
  return (
    <div className="ti-app">
      <SuiteRail active="lumen" />
      <LumenDrawer />
      <main className="ti-main">
        <header className="lm-pagehdr">
          <h1>Overview</h1>
          <span className="sp"></span>
          <button className="lm-icon-btn" type="button" aria-label="Settings" title="Settings"><span className="material-symbols-outlined">settings</span></button>
          <button className="lm-icon-btn" type="button" aria-label="Help" title="Help"><span className="material-symbols-outlined">help</span></button>
        </header>
        {surface === "empty" ? <LumenEmpty />
          : surface === "error" ? <LumenError onRetry={() => setSurface("loading")} />
          : surface === "loading" ? <LumenLoading />
          : (
            <div className="ti-content">
              <Overview onSchedule={() => setScheduleOpen(true)} onAlert={() => setAlertOpen(true)} />
            </div>
          )}
      </main>
      {scheduleOpen && <LumenScheduleModal onClose={() => setScheduleOpen(false)} />}
      {alertOpen && <LumenAlertModal onClose={() => setAlertOpen(false)} />}
      <SuiteStates
        states={[["main", "Overview"], ["detail", "Schedule report"], ["edit", "Create alert"], ["empty", "Empty"], ["error", "Error"], ["loading", "Loading"]]}
        value={demoValue} onChange={onState}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
