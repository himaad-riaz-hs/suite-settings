<!-- @template name="Perch · Content (shell test)" description="Fresh Perch sub-area built from scratch to confirm the Suite-shell defaults: global rail + Perch sub-nav drawer + empty/error/loading states." -->
<!doctype html>
<html lang="en">
<head>
  <base href="../">
  <meta charset="utf-8">
  <meta name="viewport" content="width=1440">
  <title>Hootsuite · Perch · Content (shell test)</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="../components.css">
  <link rel="stylesheet" href="src/suite-shell.css">
  <link rel="stylesheet" href="src/perch-drawer.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0..200&display=block">
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { background: var(--bento-theme-color-bg-app); color: var(--bento-theme-color-text-base); font-family: var(--bento-theme-font-families-primary); -webkit-font-smoothing: antialiased; overflow: hidden; }
    .ct-main { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--bento-theme-color-bg-app); }
    .ct-top { height: 64px; flex-shrink: 0; background: var(--bento-theme-color-bg-surface); border-bottom: 1px solid var(--bento-theme-color-border-subtle); display: flex; align-items: center; gap: 12px; padding: 0 24px; }
    .ct-top h1 { font-weight: 700; font-size: 24px; margin: 0; }
    .ct-top .sp { flex: 1; }
    .ct-body { flex: 1; min-height: 0; overflow: auto; padding: 24px; }
    .ct-panel { background: var(--bento-theme-color-bg-surface); border: 1px solid var(--bento-theme-color-border-subtle); border-radius: 12px; overflow: hidden; }
    .ct-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .ct-table th, .ct-table td { text-align: left; padding: 14px 18px; border-bottom: 1px solid var(--bento-theme-color-border-subtle); }
    .ct-table th { font-weight: 600; font-size: 13px; color: var(--bento-theme-color-text-subtle); }
    .ct-table tbody tr:last-child td { border-bottom: 0; }
    .ct-table tbody tr:hover { background: var(--bento-system-sys-neutral-alt-50); }
    .ct-name { display: flex; align-items: center; gap: 12px; font-weight: 600; }
    .ct-thumb { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="src/suite-rail.jsx"></script>
  <script type="text/babel" src="src/suite-states.jsx"></script>
  <script type="text/babel" src="src/perch-drawer.jsx"></script>
  <script type="text/babel">
    const ITEMS = [
      ["Spring drop hero image", "Image", "Spring campaign", "2 days ago", "linear-gradient(135deg,#E6A8C2,#C9789B)"],
      ["Fee-free explainer video", "Video", "Know Your Social", "4 days ago", "linear-gradient(135deg,#73C2F0,#3F8FD4)"],
      ["Round-ups carousel", "Carousel", "Product launches", "1 week ago", "linear-gradient(135deg,#3FB6A8,#2A8C82)"],
      ["Earth Day cleanup recap", "Image", "Evergreen", "2 weeks ago", "linear-gradient(135deg,#9DB87E,#6B8C4A)"],
    ];
    function Top() {
      return (
        <header className="ct-top">
          <h1>Content</h1><span className="sp"></span>
          <button className="hs-btn hs-btn--secondary" type="button"><span className="material-symbols-outlined">upload</span>Upload</button>
          <button className="hs-btn hs-btn--primary" type="button"><span className="material-symbols-outlined">add</span>New content</button>
        </header>
      );
    }
    function ContentList() {
      return (
        <div className="ct-main"><Top />
          <div className="ct-body"><div className="ct-panel">
            <table className="ct-table">
              <thead><tr><th>Name</th><th>Type</th><th>Library</th><th>Updated</th><th aria-label="Actions"></th></tr></thead>
              <tbody>{ITEMS.map((r,i)=>(
                <tr key={i}><td><span className="ct-name"><span className="ct-thumb" style={{background:r[4]}}></span>{r[0]}</span></td><td>{r[1]}</td><td>{r[2]}</td><td style={{color:"var(--bento-theme-color-text-subtle)"}}>{r[3]}</td><td style={{textAlign:"right"}}><button className="hs-btn hs-btn--ghost hs-btn--icon" type="button" aria-label="More" title="More"><span className="material-symbols-outlined">more_horiz</span></button></td></tr>
              ))}</tbody>
            </table>
          </div></div>
        </div>
      );
    }
    function State({ kind, onRetry }) {
      const cfg = kind === "empty"
        ? { cls:"empty", ic:"perm_media", h:"No content yet", p:"Upload images, videos, and carousels to reuse across posts. Everything you add shows up here.", a:"Upload content", ai:"upload" }
        : { cls:"error", ic:"cloud_off", h:"We couldn't load your content", p:"Your library is safe — this is usually a brief connection issue.", a:"Try again", ai:"refresh" };
      return (
        <div className="ct-main"><Top />
          <div className={"suite-state " + cfg.cls}><div className="suite-state-inner">
            <div className="ico"><span className="material-symbols-outlined">{cfg.ic}</span></div>
            <h2>{cfg.h}</h2><p>{cfg.p}</p>
            <div className="acts"><button className="hs-btn hs-btn--primary" type="button" onClick={onRetry}><span className="material-symbols-outlined">{cfg.ai}</span>{cfg.a}</button></div>
          </div></div>
        </div>
      );
    }
    function Loading() {
      return (
        <div className="ct-main" aria-busy="true"><Top />
          <div className="ct-body"><div className="ct-panel"><div style={{padding:16,display:"flex",flexDirection:"column",gap:16}}>
            {[0,1,2,3].map(i=><div key={i} style={{display:"flex",gap:12,alignItems:"center"}}><div className="suite-sk" style={{width:40,height:40,borderRadius:8}}></div><div className="suite-sk" style={{flex:1,height:14}}></div><div className="suite-sk" style={{width:80,height:14}}></div></div>)}
          </div></div></div>
        </div>
      );
    }
    function App() {
      const [s, setS] = React.useState("list");
      return (
        <div className="suite-app">
          <SuiteRail active="perch" />
          <PerchDrawer active="content" />
          {s === "list" && <ContentList />}
          {s === "empty" && <State kind="empty" onRetry={() => setS("list")} />}
          {s === "error" && <State kind="error" onRetry={() => setS("loading")} />}
          {s === "loading" && <Loading />}
          <SuiteStates states={[["list","List"],["empty","Empty"],["error","Error"],["loading","Loading"]]} value={s} onChange={setS} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
